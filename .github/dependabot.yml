version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: quarterly
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    allow:
      - dependency-type: all
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "fix: "
      prefix-development: "chore: "
    groups:
      lockfile-dev:
        dependency-type: "development"
      lockfile-runtime:
        dependency-type: "production"
    cooldown:
      default-days: 7
  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: monthly
    groups:
      hooks:
        patterns:
          - "*"
    commit-message:
      prefix: "chore: "
    cooldown:
      default-days: 7
